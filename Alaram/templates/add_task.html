{% extends 'base.html' %}
{% block title %}Add Task — TaskReminder{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
  <div style="width:100%;max-width:600px;">

    <!-- Breadcrumb -->
    <div class="d-flex align-items-center gap-2 mb-4 fade-up" style="font-size:.85rem;color:var(--muted);">
      <a href="{% url 'home' %}" style="color:var(--muted);text-decoration:none;">Dashboard</a>
      <i class="bi bi-chevron-right" style="font-size:.7rem;"></i>
      <span style="color:var(--accent);">New Task</span>
    </div>

    <div class="fade-up delay-1">
      <h1 class="section-title mb-1">Add <span>New Task</span></h1>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:2rem;">Fill in the details and set your reminder</p>
    </div>

    <div class="glass-card p-4 p-md-5 fade-up delay-2">
      <form method="post" novalidate>
        {% csrf_token %}

        <!-- Title -->
        <div class="mb-4">
          <label class="form-label">Task Title <span style="color:var(--red);">*</span></label>
          <input type="text" name="title" class="form-control"
                 placeholder="e.g. Review project proposal"
                 value="{{ request.POST.title|default:'' }}"/>
        </div>

        <!-- Description -->
        <div class="mb-4">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="4"
                    placeholder="Add details about this task…"
                    style="resize:vertical;">{{ request.POST.description|default:'' }}</textarea>
        </div>

        <!-- Reminder Time -->
        <div class="mb-4">
          <label class="form-label">Reminder Time</label>
          <div class="row g-2">
            <div class="col-4">
              <select name="reminder_hour" class="form-control">
                <option value="">Hour</option>
                {% for hour in hours %}
                <option value="{{ hour }}" {% if request.POST.reminder_hour == hour %}selected{% endif %}>{{ hour }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-4">
              <select name="reminder_minute" class="form-control">
                <option value="">Minute</option>
                {% for minute in minutes %}
                <option value="{{ minute }}" {% if request.POST.reminder_minute == minute %}selected{% endif %}>{{ minute }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-4">
              <select name="reminder_period" class="form-control">
                <option value="AM" {% if request.POST.reminder_period == 'AM' %}selected{% endif %}>AM</option>
                <option value="PM" {% if request.POST.reminder_period == 'PM' %}selected{% endif %}>PM</option>
              </select>
            </div>
          </div>
          <div style="color:var(--muted);font-size:.8rem;margin-top:5px;">
            Choose hour, minute, and AM or PM.
          </div>
        </div>

        <!-- Completed toggle -->
        <div class="mb-5">
          <label class="form-label d-block mb-2">Status</label>
          <label style="display:inline-flex;align-items:center;gap:10px;cursor:pointer;
                        background:var(--surface);border:1px solid var(--border);
                        padding:10px 16px;border-radius:10px;user-select:none;">
            <input type="checkbox" name="completed" id="completedCheck"
                   class="form-check-input" style="width:18px;height:18px;margin:0;cursor:pointer;"
                   {% if request.POST.completed %}checked{% endif %}/>
            <span style="font-size:.9rem;">Mark as completed</span>
          </label>
        </div>

        <!-- Actions -->
        <div class="d-flex gap-3">
          <button type="submit" class="btn-primary-custom flex-fill">
            <i class="bi bi-check2-circle me-2"></i>Create Task
          </button>
          <a href="{% url 'home' %}" class="btn-ghost text-center" style="flex:.4;">
            Cancel
          </a>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
