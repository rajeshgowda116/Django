<!DOCTYPE html>
<html>

<head>
  <title>Student ID Card</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }

    .id-card {
      width: 320px;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .id-header {
      background: linear-gradient(135deg, #0d6efd, #0dcaf0);
      color: white;
      padding: 15px;
      font-weight: bold;
      font-size: 18px;
    }

    .profile-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      margin-top: -50px;
      background: white;
    }

    .id-body {
      padding: 20px;
    }

    .id-body h5 {
      margin-top: 10px;
      font-weight: 600;
    }

    .info {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .id-footer {
      background: #f1f3f5;
      padding: 8px;
      font-size: 12px;
    }
  </style>

</head>

<body>
 {% for idcard in idcards%}
  <div class="id-card">

    <div class="id-header">
      STUDENT ID CARD
    </div>
   
    <div class="id-body">

      <img src="{{ idcard.photo.url }}" class="profile-img">
  

      <h5>{{ idcard.fullname }}</h5>

      <div class="info"><strong>Branch:</strong> {{ idcard.branch }}</div>
      <div class="info"><strong>College:</strong> {{ idcard.college_name }}</div>
      <div class="info"><strong>Year:</strong> {{ idcard.year }}</div>

    </div>

    <div class="id-footer">
      Valid Student Identification
    </div>

  </div>
{% endfor %}
</body>

</html>
